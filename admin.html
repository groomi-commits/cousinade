<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edward D'or — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f4ede2; --card:#fffaf3; --ink:#3a2e22; --muted:#8a7a66; --accent:#ff6b4a; --accent-dark:#e8543a; --line:#ece0d0; --pill:#fff0e6; --danger:#c0392b; --green:#1f9d63; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Nunito",system-ui,sans-serif; color:var(--ink); background:var(--bg); display:flex; justify-content:center; padding:24px 16px 60px; }
    .container { width:100%; max-width:640px; }
    header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px; }
    h1 { font-family:"Fredoka",sans-serif; font-weight:700; font-size:1.7rem; margin:0; }
    .tag { font-family:"Fredoka",sans-serif; font-weight:600; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:var(--accent-dark); background:var(--pill); padding:4px 10px; border-radius:999px; }
    .sub { color:var(--muted); font-weight:700; margin:0 0 18px; }
    .card { background:var(--card); border-radius:18px; padding:18px; box-shadow:0 8px 22px rgba(120,70,30,0.10); margin-bottom:16px; }
    .card h2 { font-family:"Fredoka",sans-serif; font-size:1.05rem; margin:0 0 4px; }
    .addhint { color:var(--muted); font-weight:700; font-size:0.86rem; margin:0 0 14px; }
    input { width:100%; font-family:inherit; font-size:1.05rem; padding:12px 14px; border:2px solid var(--line); border-radius:12px; background:#fff; color:var(--ink); outline:none; transition:border-color .15s,box-shadow .15s; margin-bottom:10px; }
    input:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(255,107,74,0.3); }
    .choices { display:flex; gap:8px; margin-bottom:10px; } .choices.wrap { flex-wrap:wrap; }
    .choice { flex:1; display:flex; align-items:center; justify-content:center; text-align:center; font-family:"Fredoka",sans-serif; font-weight:600; font-size:0.95rem; padding:10px 6px; border:2px solid var(--line); border-radius:11px; background:#fff; color:var(--ink); cursor:pointer; transition:all .12s; }
    .choices.wrap .choice { flex:1 1 30%; min-width:88px; }
    .choice.selected { border-color:var(--accent); background:var(--pill); color:var(--accent-dark); }
    .buckets { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
    .bucket { background:var(--pill); border-radius:12px; padding:10px 12px; font-weight:800; display:flex; justify-content:space-between; align-items:center; }
    .bucket .n { font-family:"Fredoka",sans-serif; font-size:1.2rem; color:var(--accent-dark); }
    .famtally { margin-top:12px; padding-top:12px; border-top:1px dashed var(--line); color:var(--muted); font-weight:800; font-size:0.85rem; text-align:center; }
    .total { text-align:center; font-family:"Fredoka",sans-serif; font-size:1.05rem; margin-top:10px; color:var(--muted); }
    .players { display:flex; flex-wrap:wrap; gap:8px; }
    .ptag { display:inline-flex; align-items:center; gap:8px; background:#fff; border:1.5px solid var(--line); border-radius:999px; padding:7px 8px 7px 12px; font-weight:700; font-size:0.92rem; }
    .ptag .meta { color:var(--muted); font-weight:700; font-size:0.82rem; }
    .x { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:#f4e7df; color:var(--muted); cursor:pointer; font-weight:800; font-size:0.95rem; line-height:1; flex:none; }
    .x:hover { background:#f6d3cc; color:var(--danger); }
    .btns { display:flex; flex-wrap:wrap; gap:10px; }
    button { font-family:"Fredoka",sans-serif; font-weight:600; font-size:1rem; color:#fff; background:var(--accent); border:none; border-radius:12px; padding:13px 18px; cursor:pointer; transition:background .15s,transform .05s; flex:1; min-width:150px; }
    button:hover { background:var(--accent-dark); } button:active { transform:translateY(1px); } button:disabled { opacity:0.6; cursor:default; }
    button.reveal { background:var(--green); } button.reveal:hover { background:#18804f; }
    button.ghost { background:#fff; color:var(--ink); border:2px solid var(--line); } button.ghost:hover { background:#faf4ec; }
    button.danger { background:#fff; color:var(--danger); border:2px solid #f0cfc9; flex:none; min-width:auto; padding:10px 14px; font-size:0.88rem; } button.danger:hover { background:#fdeeec; }
    button.mini { flex:none; min-width:auto; padding:8px 16px; }
    .banner { border-radius:12px; padding:11px 14px; font-weight:800; font-size:0.92rem; margin-bottom:14px; }
    .banner.todo { background:#eef4ff; border:1.5px solid #c7d9ff; color:#2b4d99; }
    .banner.warn { background:#fff3e0; border:1.5px solid #ffd49b; color:#8a5a00; }
    .banner.ok { background:#e7f7ee; border:1.5px solid #aee6c7; color:#14784a; }
    .teams { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .teamcard { background:#fff; border:2px solid var(--line); border-radius:16px; padding:12px; }
    .teamcard .head { display:flex; align-items:center; gap:8px; font-family:"Fredoka",sans-serif; font-weight:700; font-size:1.05rem; }
    .teamcard .head .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .swatch { width:14px; height:14px; border-radius:50%; flex:none; }
    .teamcard .comp { color:var(--muted); font-weight:800; font-size:0.76rem; margin:4px 0 8px; }
    .member { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:7px 2px; border-top:1px solid var(--line); }
    .member:nth-of-type(1) { border-top:none; }
    .member .nm { font-weight:700; font-size:0.92rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .member .fam { color:var(--muted); font-weight:700; font-size:0.76rem; }
    .ctrls { display:flex; align-items:center; gap:6px; flex:none; }
    .chips { display:flex; gap:5px; }
    .chip { width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1px var(--line); transition:transform .08s; }
    .chip:hover { transform:scale(1.18); } .chip.current { box-shadow:0 0 0 2px var(--ink); cursor:default; }
    .capselect { display:flex; align-items:center; gap:6px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); font-weight:800; font-size:0.82rem; color:var(--muted); }
    .capselect select { flex:1; font-family:inherit; font-weight:700; font-size:0.88rem; padding:7px 8px; border:1.5px solid var(--line); border-radius:9px; background:#fff; color:var(--ink); margin:0; }
    .gthemes { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:12px; }
    .gtheme { position:relative; font-family:"Fredoka",sans-serif; font-weight:600; text-align:center; padding:14px 22px; border:2px solid var(--line); border-radius:12px; background:#fff; cursor:pointer; transition:all .12s; }
    .gtheme .gx { position:absolute; top:5px; right:5px; width:20px; height:20px; font-size:0.78rem; }
    .gtheme.sel { border-color:var(--accent); background:var(--pill); color:var(--accent-dark); }
    .gtheme.done { color:var(--muted); background:#efe7dc; cursor:default; border-style:dashed; }
    .launchbar { margin-top:14px; font-weight:800; display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--pill); padding:12px 14px; border-radius:12px; }
    .selrow { padding:9px 4px; border-top:1px solid var(--line); font-weight:700; font-size:0.95rem; }
    .selrow:first-of-type { border-top:none; }
    .scoreboard { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
    .scorerow { display:flex; align-items:center; gap:10px; background:#fff; border:1.5px solid var(--line); border-radius:12px; padding:10px 12px; }
    .scorerow .rk { font-size:1.2rem; flex:none; }
    .scorerow .sname { flex:1; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .scorerow .pts { font-family:"Fredoka",sans-serif; font-weight:700; color:var(--accent-dark); flex:none; }
    .scorerow .addbtn { flex:none; min-width:auto; padding:8px 12px; font-size:0.9rem; }
    .history { display:flex; flex-direction:column; gap:6px; margin-top:10px; }
    .histrow { display:flex; align-items:center; gap:8px; font-weight:700; font-size:0.9rem; }
    .histrow .x { margin-left:auto; }
    .selrow .swatch { display:inline-block; vertical-align:middle; margin-right:6px; }
    .empty { color:var(--muted); font-weight:700; text-align:center; padding:14px 0; }
    .note { color:var(--muted); font-weight:700; font-size:0.88rem; margin-top:10px; text-align:center; }
    @media (max-width:460px) { .teams { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>🏆 Edward D'or</h1><span class="tag">Admin</span></header>
    <p class="sub">Tableau de bord</p>

    <div class="card" id="addCard">
      <h2>➕ Ajouter quelqu'un à la main</h2>
      <p class="addhint">Pour les enfants ou ceux qui n'ont pas de téléphone.</p>
      <input id="addName" type="text" placeholder="Prénom" autocomplete="off" maxlength="40" />
      <div class="choices" id="addSex"><div class="choice" data-val="H">Homme</div><div class="choice" data-val="F">Femme</div></div>
      <div class="choices" id="addAge"><div class="choice" data-val="jeune">Jeune</div><div class="choice" data-val="senior">Plus trop jeune (essaye de l'être)</div></div>
      <div class="choices wrap" id="addFam"></div>
      <button id="addBtn" style="width:100%">＋ Ajouter à la liste</button>
    </div>

    <div id="dynamic"><div class="card"><div class="empty">Chargement…</div></div></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const SUPABASE_URL = "https://bzspxqvbbdtefhugjogt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_nAUDhRZoY7cd4FBRLACU5A_oule5R-0";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const TEAMS = { 1:{name:"Rouge",emoji:"🔴",hex:"#e23b2e"}, 2:{name:"Bleu",emoji:"🔵",hex:"#2f6df0"}, 3:{name:"Vert",emoji:"🟢",hex:"#1f9d63"}, 4:{name:"Jaune",emoji:"🟡",hex:"#e8a200"} };
    const FAMILIES = [ {val:"MOUDA",label:"Mouda"}, {val:"POIRIER",label:"Poirier"}, {val:"BOUVIER",label:"Bouvier"}, {val:"DOUKHAN/DAINNE",label:"Doukhan/Dainne"}, {val:"AUTRE",label:"Autre"} ];
    const famLabel = (v) => { const f = FAMILIES.find((x) => x.val === v); return f ? f.label : (v || "?"); };

    const dyn = document.getElementById("dynamic");
    let players = [], teamsData = {}, gamesData = [], scoresData = [], activeGame = null, pendingTheme = null;

    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
    const sexLabel = (s) => (s === "H" ? "H" : s === "F" ? "F" : "?");
    const ageLabel = (a) => (a === "jeune" ? "Jeune" : a === "senior" ? "Sénior" : "?");
    const teamName = (t) => (teamsData[t] && teamsData[t].name && teamsData[t].name.trim()) ? teamsData[t].name : `Équipe ${TEAMS[t].name}`;
    const nameById = (id) => { const p = players.find((x) => x.id === id); return p ? p.name : "?"; };
    const requiredLabel = (n) => (n === 0 ? "toute l'équipe" : `${n} joueur${n > 1 ? "s" : ""} par équipe`);
    const teamTotal = (t) => scoresData.filter((s) => s.team === t).reduce((a, s) => a + s.points, 0);

    document.getElementById("addFam").innerHTML = FAMILIES.map((f) => `<div class="choice" data-val="${f.val}">${f.label}</div>`).join("");
    let addSex = null, addAge = null, addFam = null;
    function wireChoiceGroup(id, setter) {
      const c = document.getElementById(id);
      c.querySelectorAll(".choice").forEach((el) => el.addEventListener("click", () => {
        c.querySelectorAll(".choice").forEach((x) => x.classList.remove("selected"));
        el.classList.add("selected"); setter(el.dataset.val);
      }));
    }
    wireChoiceGroup("addSex", (v) => (addSex = v)); wireChoiceGroup("addAge", (v) => (addAge = v)); wireChoiceGroup("addFam", (v) => (addFam = v));
    const addName = document.getElementById("addName"), addBtn = document.getElementById("addBtn");
    addBtn.addEventListener("click", async () => {
      const name = addName.value.trim();
      if (!name) { addName.focus(); return; }
      if (!addSex) { alert("Choisis Homme ou Femme"); return; }
      if (!addAge) { alert("Choisis la catégorie d'âge"); return; }
      if (!addFam) { alert("Choisis la famille"); return; }
      addBtn.disabled = true; addBtn.textContent = "Ajout…";
      const { error } = await supabase.from("players").insert({ name, sex:addSex, age_group:addAge, family:addFam });
      addBtn.disabled = false; addBtn.textContent = "＋ Ajouter à la liste";
      if (error) { alert("Erreur : " + error.message); return; }
      addName.value = ""; addSex = null; addAge = null; addFam = null;
      document.querySelectorAll("#addSex .choice, #addAge .choice, #addFam .choice").forEach((x) => x.classList.remove("selected"));
      addName.focus(); load();
    });
    addName.addEventListener("keydown", (e) => { if (e.key === "Enter") addBtn.click(); });

    async function load() {
      const [pRes, tRes, gRes, sRes] = await Promise.all([
        supabase.from("players").select("*").order("created_at", { ascending: true }),
        supabase.from("teams").select("*"),
        supabase.from("games").select("*").order("position", { ascending: true }),
        supabase.from("scores").select("*"),
      ]);
      if (pRes.error) { dyn.innerHTML = `<div class="card"><div class="empty">Erreur : ${escapeHtml(pRes.error.message)}</div></div>`; return; }
      players = pRes.data || [];
      teamsData = {}; (tRes.data || []).forEach((t) => (teamsData[t.id] = t));
      gamesData = gRes.data || [];
      scoresData = sRes.data || [];
      activeGame = gamesData.find((g) => g.status === "active") || null;
      render();
    }

    function bucketsHtml() {
      const b = { "H-jeune":0,"F-jeune":0,"H-senior":0,"F-senior":0 };
      players.forEach((p) => { const k = `${p.sex}-${p.age_group}`; if (k in b) b[k]++; });
      const fam = FAMILIES.map((f) => `${f.label} ${players.filter((p) => p.family === f.val).length}`).join(" · ");
      return `<div class="card"><h2>Inscrits</h2>
        <div class="buckets" style="margin-top:12px">
          <div class="bucket"><span>🧑 Jeunes hommes</span><span class="n">${b["H-jeune"]}</span></div>
          <div class="bucket"><span>👩 Jeunes femmes</span><span class="n">${b["F-jeune"]}</span></div>
          <div class="bucket"><span>👴 Séniors hommes</span><span class="n">${b["H-senior"]}</span></div>
          <div class="bucket"><span>👵 Séniors femmes</span><span class="n">${b["F-senior"]}</span></div>
        </div>
        <div class="famtally">👪 ${fam}</div>
        <div class="total">Total : ${players.length} cousin·e·s</div></div>`;
    }
    function tagList(arr) {
      return arr.map((p) => `<span class="ptag">${escapeHtml(p.name)} <span class="meta">${sexLabel(p.sex)} · ${ageLabel(p.age_group)} · ${escapeHtml(famLabel(p.family))}</span><span class="x" data-del="${p.id}" data-name="${escapeHtml(p.name)}">✕</span></span>`).join("");
    }
    function memberHtml(p, captainId) {
      const isCap = captainId && p.id === captainId;
      const chips = [1,2,3,4].map((t) => `<span class="chip ${p.draft_team === t ? "current" : ""}" style="background:${TEAMS[t].hex}" ${p.draft_team === t ? "" : `data-move-id="${p.id}" data-move-team="${t}"`} title="${TEAMS[t].name}"></span>`).join("");
      return `<div class="member"><span class="nm">${isCap ? "👑 " : ""}${escapeHtml(p.name)} <span class="fam">${escapeHtml(famLabel(p.family))}</span></span><span class="ctrls"><span class="chips">${chips}</span><span class="x" data-del="${p.id}" data-name="${escapeHtml(p.name)}">✕</span></span></div>`;
    }

    function classementCardHtml() {
      const medals = ["🥇","🥈","🥉","4️⃣"];
      const ranked = [1,2,3,4].map((t) => ({ t, total: teamTotal(t) })).sort((a, b) => b.total - a.total || a.t - b.t);
      const rows = ranked.map((r, i) => `<div class="scorerow"><span class="rk">${medals[i]}</span><span class="swatch" style="background:${TEAMS[r.t].hex}"></span><span class="sname">${escapeHtml(teamName(r.t))}</span><span class="pts">${r.total} pts</span><button class="mini addbtn" data-addteam="${r.t}">＋ pts</button></div>`).join("");
      const recent = scoresData.slice().sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 6);
      const hist = recent.length ? recent.map((s) => `<div class="histrow"><span class="swatch" style="background:${TEAMS[s.team].hex}"></span>${s.points > 0 ? "+" : ""}${s.points} pts${s.label ? " · " + escapeHtml(s.label) : ""}<span class="x" data-delscore="${s.id}">✕</span></div>`).join("") : `<div class="empty" style="padding:8px 0">Aucun point pour l'instant.</div>`;
      return `<div class="card"><h2>🏆 Classement</h2><p class="addhint">Clique "＋ pts" pour donner (ou retirer) des points à une équipe.</p><div class="scoreboard">${rows}</div><h2 style="margin-top:16px;font-size:0.95rem">Derniers points</h2><div class="history">${hist}</div></div>`;
    }

    function gamesCardHtml(revealed) {
      const done = gamesData.filter((g) => g.status === "done").length;
      let inner;
      if (activeGame) {
        const all = activeGame.required === 0;
        const noCaptain = !all && [1,2,3,4].some((t) => teamsData[t] && !teamsData[t].captain_id);
        const rows = [1,2,3,4].map((t) => {
          if (all) {
            const n = players.filter((p) => p.team === t).length;
            return `<div class="selrow"><span class="swatch" style="background:${TEAMS[t].hex}"></span><b>${escapeHtml(teamName(t))}</b> : toute l'équipe <span style="color:var(--muted)">(${n} joueur·s)</span></div>`;
          }
          const sel = (teamsData[t] && Array.isArray(teamsData[t].selected)) ? teamsData[t].selected : [];
          const names = sel.map((id) => escapeHtml(nameById(id)));
          const txt = names.length ? names.join(", ") : `<span style="color:var(--muted)">en attente du chef…</span>`;
          return `<div class="selrow"><span class="swatch" style="background:${TEAMS[t].hex}"></span><b>${escapeHtml(teamName(t))}</b> : ${txt} <span style="color:var(--muted)">(${names.length}/${activeGame.required})</span></div>`;
        }).join("");
        inner = `<div class="banner ok" style="margin-bottom:8px">🎯 En cours : <b>${escapeHtml(activeGame.theme)}</b> — ${requiredLabel(activeGame.required)}</div>
          ${noCaptain ? `<div class="banner warn">⚠️ Une ou plusieurs équipes n'ont pas de chef — désigne-les plus haut pour qu'ils puissent choisir.</div>` : ""}
          <div>${rows}</div>
          <div class="btns" style="margin-top:14px"><button id="endGameBtn" class="reveal">✅ Terminer ce jeu</button><button id="cancelGameBtn" class="ghost">Annuler</button></div>`;
      } else {
        const cards = gamesData.map((g) => {
          const isDone = g.status === "done";
          return `<div class="gtheme ${isDone ? "done" : (pendingTheme === g.theme ? "sel" : "")}" ${isDone ? "" : `data-theme="${escapeHtml(g.theme)}"`}>${isDone ? "✓ " : ""}${escapeHtml(g.theme)}<span class="x gx" data-delgame="${escapeHtml(g.theme)}">✕</span></div>`;
        }).join("");
        const bar = pendingTheme ? `<div class="launchbar">Lancer « ${escapeHtml(pendingTheme)} » avec : <button data-launch="1" class="mini">1</button><button data-launch="2" class="mini">2</button><button data-launch="3" class="mini">3</button><button data-launch="0" class="mini ghost">Toute l'équipe</button></div>` : "";
        inner = `<div class="gthemes">${cards}</div>${bar}
          <div class="btns" style="margin-top:14px"><button id="addGameBtn" class="ghost">➕ Ajouter un jeu</button></div>`;
      }
      return `<div class="card"><h2>🎡 Jeux de l'après-midi</h2><p class="addhint">${done}/${gamesData.length} jeux faits. Clique le thème tiré à la roue.</p>${inner}</div>`;
    }

    function render() {
      const total = players.length;
      const hasDraft = players.some((p) => p.draft_team != null);
      const revealed = players.some((p) => p.team != null);
      const pending = players.some((p) => (p.team ?? null) !== (p.draft_team ?? null));

      let html = bucketsHtml();

      if (!hasDraft) {
        html += `<div class="card"><h2>En attente du tirage</h2>
          <div class="players" style="margin-top:12px">${total === 0 ? `<div class="empty">Personne pour l'instant… partage le lien (ou ajoute des gens à la main) !</div>` : tagList(players)}</div>
          <div class="btns" style="margin-top:16px"><button id="drawBtn" ${total < 4 ? "disabled" : ""}>🎲 Lancer le tirage</button></div>
          ${total > 0 && total < 4 ? `<div class="note">Il faut au moins 4 inscrits pour faire 4 équipes.</div>` : ""}</div>`;
      } else {
        const byTeam = { 1:[],2:[],3:[],4:[] }, unplaced = [];
        players.forEach((p) => { if (p.draft_team) byTeam[p.draft_team].push(p); else unplaced.push(p); });
        let banner;
        if (!revealed) banner = `<div class="banner todo">🔒 Brouillon — les joueurs ne voient pas encore leurs équipes. Ajuste si besoin, puis révèle.</div>`;
        else if (pending) banner = `<div class="banner warn">✏️ Tu as modifié des équipes. Clique "Publier" pour mettre à jour ce que voient les joueurs.</div>`;
        else banner = `<div class="banner ok">✅ Les joueurs voient leurs équipes (à jour).</div>`;
        const teamsHtml = [1,2,3,4].map((t) => {
          const list = byTeam[t], capId = teamsData[t] ? teamsData[t].captain_id : null;
          const h = list.filter((p) => p.sex === "H").length, f = list.filter((p) => p.sex === "F").length;
          const j = list.filter((p) => p.age_group === "jeune").length, s = list.filter((p) => p.age_group === "senior").length;
          const capOptions = `<option value="">— aucun —</option>` + list.map((p) => `<option value="${p.id}" ${capId === p.id ? "selected" : ""}>${escapeHtml(p.name)}</option>`).join("");
          return `<div class="teamcard"><div class="head"><span class="swatch" style="background:${TEAMS[t].hex}"></span><span class="nm">${escapeHtml(teamName(t))}</span><span class="x" data-edit-team="${t}" title="Renommer">✏️</span></div>
            <div class="comp">${list.length} joueur·s · ${h}H/${f}F · ${j}J/${s}S</div>
            ${list.map((p) => memberHtml(p, capId)).join("") || `<div class="empty" style="padding:8px 0">—</div>`}
            ${list.length ? `<div class="capselect">👑 Chef :<select data-cap-team="${t}">${capOptions}</select></div>` : ""}</div>`;
        }).join("");
        const revealBtn = pending ? `<button id="revealBtn" class="reveal">${revealed ? "🔄 Publier les changements" : "✅ Révéler aux joueurs"}</button>` : `<button class="reveal" disabled>✓ Équipes à jour</button>`;
        html += `<div class="card"><h2>Les 4 équipes ${revealed ? "" : "(brouillon)"}</h2>
          <p class="addhint">Point de couleur = déplacer · ✏️ = renommer · 👑 = désigner le chef.</p>
          ${banner}<div class="teams">${teamsHtml}</div>
          ${unplaced.length ? `<h2 style="margin-top:16px">Pas encore dans une équipe</h2><div style="margin-top:8px">${unplaced.map((p) => memberHtml(p, null)).join("")}</div>` : ""}
          <div class="btns" style="margin-top:16px">${revealBtn}</div>
          <div class="btns" style="margin-top:10px"><button id="drawBtn" class="ghost">🎲 Refaire le tirage</button><button id="clearBtn" class="ghost">Annuler le tirage</button></div></div>`;
      }

      if (revealed) html += classementCardHtml();
      if (revealed) html += gamesCardHtml(revealed);

      html += `<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:12px"><span style="color:var(--muted);font-weight:800">Repartir de zéro pour un test</span><button id="wipeBtn" class="danger">🗑️ Tout effacer</button></div>`;

      dyn.innerHTML = html;
      const g = (id) => document.getElementById(id);
      if (g("drawBtn")) g("drawBtn").addEventListener("click", runDraw);
      if (g("revealBtn")) g("revealBtn").addEventListener("click", reveal);
      if (g("clearBtn")) g("clearBtn").addEventListener("click", clearTeams);
      if (g("wipeBtn")) g("wipeBtn").addEventListener("click", wipeAll);
      if (g("endGameBtn")) g("endGameBtn").addEventListener("click", endGame);
      if (g("cancelGameBtn")) g("cancelGameBtn").addEventListener("click", cancelGame);
      dyn.querySelectorAll("[data-del]").forEach((el) => el.addEventListener("click", () => deletePlayer(el.dataset.del, el.dataset.name)));
      dyn.querySelectorAll("[data-move-id]").forEach((el) => el.addEventListener("click", () => movePlayer(el.dataset.moveId, parseInt(el.dataset.moveTeam, 10))));
      dyn.querySelectorAll("[data-edit-team]").forEach((el) => el.addEventListener("click", () => editTeamName(parseInt(el.dataset.editTeam, 10))));
      dyn.querySelectorAll("[data-cap-team]").forEach((el) => el.addEventListener("change", () => setCaptain(parseInt(el.dataset.capTeam, 10), el.value || null)));
      dyn.querySelectorAll("[data-theme]").forEach((el) => el.addEventListener("click", () => { pendingTheme = (pendingTheme === el.dataset.theme) ? null : el.dataset.theme; render(); }));
      dyn.querySelectorAll("[data-launch]").forEach((el) => el.addEventListener("click", () => launchGame(pendingTheme, parseInt(el.dataset.launch, 10))));
      if (g("addGameBtn")) g("addGameBtn").addEventListener("click", addGame);
      dyn.querySelectorAll("[data-delgame]").forEach((el) => el.addEventListener("click", (e) => { e.stopPropagation(); deleteGame(el.dataset.delgame); }));
      dyn.querySelectorAll("[data-addteam]").forEach((el) => el.addEventListener("click", () => addScore(parseInt(el.dataset.addteam, 10))));
      dyn.querySelectorAll("[data-delscore]").forEach((el) => el.addEventListener("click", () => deleteScore(el.dataset.delscore)));
    }

    function shuffle(arr) { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

    async function runDraw() {
      const buckets = {};
      players.forEach((p) => { const k = `${p.sex}-${p.age_group}`; (buckets[k] = buckets[k] || []).push(p); });
      const arrays = Object.values(buckets).sort((a, b) => b.length - a.length);
      const teamMembers = { 1:[],2:[],3:[],4:[] }, famCount = { 1:{},2:{},3:{},4:{} }, assignments = [];
      arrays.forEach((bucket) => {
        const members = shuffle(bucket); const bc = { 1:0,2:0,3:0,4:0 };
        members.forEach((p) => {
          const fam = p.family || "NA";
          const t = [1,2,3,4].map((id) => ({ id, bc:bc[id], fc:famCount[id][fam] || 0, size:teamMembers[id].length, r:Math.random() })).sort((a, b) => a.bc - b.bc || a.fc - b.fc || a.size - b.size || a.r - b.r)[0].id;
          teamMembers[t].push(p); bc[t]++; famCount[t][fam] = (famCount[t][fam] || 0) + 1; assignments.push({ id:p.id, team:t });
        });
      });
      const btn = document.getElementById("drawBtn"); if (btn) { btn.disabled = true; btn.textContent = "Tirage en cours…"; }
      const results = await Promise.all(assignments.map((a) => supabase.from("players").update({ draft_team: a.team }).eq("id", a.id)));
      const err = results.find((r) => r.error); if (err) alert("Erreur : " + err.error.message);
      await load();
    }
    async function movePlayer(id, team) { const { error } = await supabase.from("players").update({ draft_team: team }).eq("id", id); if (error) { alert("Erreur : " + error.message); return; } await load(); }
    async function setCaptain(team, playerId) { const { error } = await supabase.from("teams").update({ captain_id: playerId }).eq("id", team); if (error) { alert("Erreur : " + error.message); return; } await load(); }
    async function editTeamName(team) {
      const current = (teamsData[team] && teamsData[team].name) ? teamsData[team].name : "";
      const n = prompt("Nom de l'équipe (laisse vide pour revenir à la couleur) :", current);
      if (n === null) return;
      const { error } = await supabase.from("teams").update({ name: n.trim() || null }).eq("id", team);
      if (error) { alert("Erreur : " + error.message); return; } await load();
    }
    async function reveal() {
      const btn = document.getElementById("revealBtn"); if (btn) { btn.disabled = true; btn.textContent = "Publication…"; }
      const toUpdate = players.filter((p) => (p.team ?? null) !== (p.draft_team ?? null));
      const results = await Promise.all(toUpdate.map((p) => supabase.from("players").update({ team: p.draft_team }).eq("id", p.id)));
      const err = results.find((r) => r.error); if (err) alert("Erreur : " + err.error.message);
      await load();
    }
    async function clearTeams() {
      if (!confirm("Annuler le tirage et remettre tout le monde en attente ?")) return;
      await Promise.all(players.map((p) => supabase.from("players").update({ team: null, draft_team: null }).eq("id", p.id)));
      await load();
    }
    async function deletePlayer(id, name) {
      if (!confirm(`Retirer ${name} de la liste ?`)) return;
      const { error } = await supabase.from("players").delete().eq("id", id);
      if (error) { alert("Erreur : " + error.message); return; } await load();
    }
    async function wipeAll() {
      if (!confirm("⚠️ Effacer TOUS les inscrits ? (seulement pour repartir d'un test propre)")) return;
      await supabase.from("players").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await load();
    }

    async function launchGame(theme, n) {
      if (!theme) return;
      await supabase.from("games").update({ status: "active", required: n }).eq("theme", theme);
      await Promise.all([1,2,3,4].map((t) => supabase.from("teams").update({ selected: [] }).eq("id", t)));
      pendingTheme = null; await load();
    }
    async function endGame() {
      if (!confirm("Terminer ce jeu ? Il ne pourra plus être relancé.")) return;
      await supabase.from("games").update({ status: "done" }).eq("status", "active");
      await load();
    }
    async function cancelGame() {
      await supabase.from("games").update({ status: "todo" }).eq("status", "active");
      await Promise.all([1,2,3,4].map((t) => supabase.from("teams").update({ selected: [] }).eq("id", t)));
      await load();
    }
    async function addGame() {
      const name = prompt("Nom du nouveau jeu :");
      if (name === null) return;
      const theme = name.trim(); if (!theme) return;
      const maxPos = gamesData.reduce((m, g) => Math.max(m, g.position || 0), 0);
      const { error } = await supabase.from("games").insert({ theme, position: maxPos + 1 });
      if (error) { alert(/duplicate|unique/i.test(error.message) ? "Ce jeu existe déjà." : "Erreur : " + error.message); return; }
      await load();
    }
    async function deleteGame(theme) {
      if (!confirm(`Supprimer le jeu « ${theme} » ?`)) return;
      const { error } = await supabase.from("games").delete().eq("theme", theme);
      if (error) { alert("Erreur : " + error.message); return; }
      if (pendingTheme === theme) pendingTheme = null;
      await load();
    }
    async function addScore(team) {
      const v = prompt(`Points pour ${teamName(team)} (un nombre ; négatif pour retirer) :`);
      if (v === null) return;
      const n = parseInt(v, 10);
      if (isNaN(n)) { alert("Entre un nombre."); return; }
      const label = activeGame ? activeGame.theme : null;
      const { error } = await supabase.from("scores").insert({ team, points: n, label });
      if (error) { alert("Erreur : " + error.message); return; }
      await load();
    }
    async function deleteScore(id) {
      if (!confirm("Supprimer cette entrée de points ?")) return;
      const { error } = await supabase.from("scores").delete().eq("id", id);
      if (error) { alert("Erreur : " + error.message); return; }
      await load();
    }

    supabase.channel("admin-watch")
      .on("postgres_changes", { event:"*", schema:"public", table:"players" }, () => load())
      .on("postgres_changes", { event:"*", schema:"public", table:"teams" }, () => load())
      .on("postgres_changes", { event:"*", schema:"public", table:"games" }, () => load())
      .on("postgres_changes", { event:"*", schema:"public", table:"scores" }, () => load())
      .subscribe();
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") load(); });
    window.addEventListener("focus", load);
    window.addEventListener("online", load);
    load();
  </script>
</body>
</html>
