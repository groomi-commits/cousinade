    .prow { display:flex; align-items:center; gap:12px; padding:14px; border-radius:16px; margin-bottom:10px; background:#fff; border:2px solid var(--line); font-weight:800; }
    .prow.hide { opacity:0.55; }
    .prow.show { animation:pop-in .45s cubic-bezier(.2,1.4,.4,1); }
    .prow .brank { font-size:1.4rem; flex:none; }
    .pava { width:46px; height:46px; border-radius:50%; object-fit:cover; flex:none; }
    .pbadge { width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex:none; }
    .prow .bname { flex:1; font-family:"Fredoka",sans-serif; font-size:1.2rem; text-align:left; }
    .prow .bpts { font-family:"Fredoka",sans-serif; font-size:1.35rem; flex:none; }
    .prow.champ { box-shadow:0 12px 34px rgba(0,0,0,0.16); border-width:3px; }

    .menu { position:fixed; inset:0; background:rgba(58,46,34,0.5); display:flex; justify-content:flex-end; z-index:50; }
    .menu[hidden] { display:none; }
    .menu-inner { background:var(--card); width:82%; max-width:320px; height:100%; padding:22px 18px; display:flex; flex-direction:column; gap:10px; box-shadow:-10px 0 40px rgba(0,0,0,0.25); }
    .menu-close { align-self:flex-end; background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--muted); margin-bottom:6px; padding:4px 8px; }
    .menu-inner a { font-family:"Fredoka",sans-serif; font-weight:600; font-size:1.2rem; padding:16px 18px; border-radius:14px; background:#fff; border:2px solid var(--line); color:var(--ink); cursor:pointer; }
    .menu-inner a.active { border-color:var(--accent); background:var(--pill); color:var(--accent-dark); }

    @keyframes spin { to { transform:rotate(360deg); } }

    @media (prefers-reduced-motion:reduce) { .spinner,.team-badge { animation:none; } }
  </style>
</head>

    function compressImage(file, max = 320, quality = 0.72) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const side = Math.min(img.width, img.height);
            const sx = (img.width - side) / 2, sy = (img.height - side) / 2;
            const canvas = document.createElement("canvas");
            canvas.width = max; canvas.height = max;
            canvas.getContext("2d").drawImage(img, sx, sy, side, side, 0, 0, max, max);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.onerror = reject; img.src = reader.result;
        };
        reader.onerror = reject; reader.readAsDataURL(file);
      });
    }

    menu.addEventListener("click", (e) => { if (e.target === menu) menu.hidden = true; });
    menu.querySelectorAll("a[data-view]").forEach((a) => a.addEventListener("click", () => { currentView = a.dataset.view; menu.hidden = true; renderCurrent(); }));
    function updateMenuActive() { menu.querySelectorAll("a[data-view]").forEach((a) => a.classList.toggle("active", a.dataset.view === currentView)); }

    // ---------- DATA ----------
    async function loadTeams() {
      const { data } = await supabase.from("teams").select("*");
      allTeams = {}; (data || []).forEach((t) => (allTeams[t.id] = t));
      myTeam = (myPlayer && myPlayer.team) ? (allTeams[myPlayer.team] || null) : null;
    }
    async function loadScores() { const { data } = await supabase.from("scores").select("team,points"); scoresData = data || []; }
    async function loadActiveGame() { const { data } = await supabase.from("games").select("*").eq("status", "active").maybeSingle(); activeGame = data || null; }
    async function loadTeammates() {
      if (!myPlayer || !myPlayer.team) { teammates = []; return; }
      const { data } = await supabase.from("players").select("id,name,photo").eq("team", myPlayer.team).order("name");
      teammates = data || [];
    }
    async function loadSubs() {
      if (!myPlayer || !myPlayer.team) { mySubs = []; return; }
      const { data } = await supabase.from("submissions").select("id,defi,status,player_id").eq("team", myPlayer.team);
      mySubs = data || [];
    }
    async function loadState() {
      const { data } = await supabase.from("state").select("phase,step").eq("id", 1).maybeSingle();
      finalePhase = data ? data.phase : "playing"; revealStep = data ? (data.step || 0) : 0;
    }
    async function loadVotesP() {
      const [vR, mvR] = await Promise.all([
        supabase.from("votes").select("category,candidate_id"),
        supabase.from("votes").select("category,candidate_id").eq("voter_id", myId),
      ]);
      allVotes = vR.data || []; myVotes = {}; (mvR.data || []).forEach((v) => (myVotes[v.category] = v.candidate_id));
    }
    async function loadApprovedP() { const { data } = await supabase.from("submissions").select("defi,team,points").eq("status", "approved"); approvedSubs = data || []; }
    async function loadFinale() {
      const { data } = await supabase.from("players").select("id,name,team,photo");
      allPlayers = data || []; await loadApprovedP(); await loadVotesP();
    }
    async function loadContext() {
      if (!myPlayer) return;
      await loadTeams(); await loadScores(); await loadActiveGame(); await loadSubs(); await loadState();
      if (myPlayer.team && activeGame) await loadTeammates(); else teammates = [];
      if (finalePhase !== "playing") await loadFinale();
    }

    // ---------- JOIN ----------
    function showJoinForm() {
      resetBg(); subtitle.textContent = "Rejoins la partie !";
      let sex = null, age = null, fam = null, photo = null;
      const famHtml = FAMILIES.map((f) => `<div class="choice" data-val="${f.val}">${f.label}</div>`).join("");
      screen.innerHTML = `
        <div class="card">
          <div class="field"><label for="nameInput">Ton prénom</label><input id="nameInput" type="text" placeholder="Ex : Léa" autocomplete="off" maxlength="40" /></div>
          <div class="field"><label>Photo (optionnel)</label>
            <div class="photo-pick"><div class="avatar-preview" id="avPreview">📷</div>
            <label class="photo-btn">Ajouter une photo<input id="photoInput" type="file" accept="image/*" hidden /></label></div>
          </div>
          <div class="field"><label>Tu es</label><div class="choices" id="sexChoices"><div class="choice" data-val="H">Homme</div><div class="choice" data-val="F">Femme</div></div></div>
          <div class="field"><label>Catégorie</label><div class="choices" id="ageChoices"><div class="choice" data-val="jeune">Jeune</div><div class="choice" data-val="senior">Plus trop jeune (essaye de l'être)</div></div></div>
          <div class="field"><label>Ta famille</label><div class="choices wrap" id="famChoices">${famHtml}</div></div>
          <button class="cta" id="joinBtn">C'est parti !</button>
        </div>`;
      const nameInput = document.getElementById("nameInput"), joinBtn = document.getElementById("joinBtn");
      const photoInput = document.getElementById("photoInput"), avPreview = document.getElementById("avPreview");
      photoInput.addEventListener("change", async () => {
        const file = photoInput.files[0]; if (!file) return;
        try { photo = await compressImage(file); avPreview.innerHTML = `<img src="${photo}" alt="" />`; }
        catch { alert("Impossible de lire cette image."); }
      });
      function wire(id, setter) { const c = document.getElementById(id); c.querySelectorAll(".choice").forEach((el) => el.addEventListener("click", () => { c.querySelectorAll(".choice").forEach((x) => x.classList.remove("selected")); el.classList.add("selected"); setter(el.dataset.val); })); }
      wire("sexChoices", (v) => (sex = v)); wire("ageChoices", (v) => (age = v)); wire("famChoices", (v) => (fam = v));
      joinBtn.addEventListener("click", async () => {
        const name = nameInput.value.trim();
        if (!name) { nameInput.focus(); return; }
        if (!sex) { alert("Choisis Homme ou Femme 🙂"); return; }
        if (!age) { alert("Choisis ta catégorie 🙂"); return; }
        if (!fam) { alert("Choisis ta famille 🙂"); return; }
        joinBtn.disabled = true; joinBtn.textContent = "On t'inscrit…";
        const { data, error } = await supabase.from("players").insert({ name, sex, age_group: age, family: fam, photo }).select().single();
        if (error) { alert("Oups : " + error.message); joinBtn.disabled = false; joinBtn.textContent = "C'est parti !"; return; }
        myPlayer = data; myId = data.id; localStorage.setItem(STORAGE_KEY, myId);

    // ---------- HELPERS ----------
    function avatarImg(photo, cls, fallback) {
      return photo ? `<img class="${cls}" src="${photo}" alt="" />` : `<span class="${cls} ph">${fallback || "👤"}</span>`;
    }

    // ---------- MAIN SUB-VIEWS ----------
    function showWaiting() {
      resetBg(); subtitle.textContent = "Tu es bien inscrit·e !";
      screen.innerHTML = `<div class="card waiting"><div class="spinner"></div><p class="big">Salut ${escapeHtml(myPlayer.name)} 👋</p><p class="hint">En attente du tirage des équipes…</p><span class="count-badge" id="countBadge">…</span></div>`;

      setBg(t.bgTop, t.bgBottom); subtitle.textContent = "Le tirage est fait !";
      const custom = myTeam && myTeam.name && myTeam.name.trim();
      const teamPhoto = myTeam && myTeam.photo;

      const badge = teamPhoto ? `<div class="team-badge" style="border:5px solid ${t.hex}"><img src="${teamPhoto}" alt="" /></div>` : `<div class="team-badge" style="background:${t.hex}">${t.emoji}</div>`;

                <div class="chef-photo"><div class="avatar-preview" id="teamAvPreview">${photoPrev}</div>
                  <label class="photo-btn">Photo d'équipe<input id="teamPhotoInput" type="file" accept="image/*" hidden /></label></div>
                <div class="row" style="margin-top:6px"><button class="save" id="saveTeamBtn" style="flex:1">Valider</button></div>
                <div class="saved" id="savedMsg"></div>
              </div>
            </div>`;
        } else {
          captainHtml = `<div class="captain-box"><div class="captain-badge">👑 Tu es le chef</div><br/><button class="editbtn" id="openEditor">✏️ Modifier mon équipe</button></div>`;
        }
      }
      screen.innerHTML = `<div class="card reveal"><div class="label">Ton équipe</div>${badge}<div class="team-name" style="color:${t.hex}">${bigName}</div><div class="team-sub">${subName}</div><div class="me-pill">${avatarImg(myPlayer.photo, "me-ava", "👤")} ${escapeHtml(myPlayer.name)}</div>${captainHtml}</div>`;

      if (isCaptain) {
        const openBtn = document.getElementById("openEditor");
        if (openBtn) openBtn.addEventListener("click", () => { editorOpen = true; showReveal(); });
        const saveBtn = document.getElementById("saveTeamBtn");
        if (saveBtn) {
          let pendingPhoto; // undefined = inchangée
          const tpInput = document.getElementById("teamPhotoInput"), tpPrev = document.getElementById("teamAvPreview");
          tpInput.addEventListener("change", async () => {
            const file = tpInput.files[0]; if (!file) return;
            try { pendingPhoto = await compressImage(file); tpPrev.innerHTML = `<img src="${pendingPhoto}" alt="" />`; }
            catch { alert("Impossible de lire cette image."); }
          });
          const saved = document.getElementById("savedMsg");
          saveBtn.addEventListener("click", async () => {
            const newName = document.getElementById("teamNameInput").value.trim();
            const patch = { name: newName || null };
            if (pendingPhoto !== undefined) patch.photo = pendingPhoto;
            saveBtn.disabled = true;
            const { error } = await supabase.from("teams").update(patch).eq("id", myPlayer.team);
            saveBtn.disabled = false;
            if (error) { saved.style.color = "#c0392b"; saved.textContent = "Erreur, réessaie."; return; }
            editorOpen = false; await loadTeams(); showReveal();
          });

    function showGame() {
      const t = TEAMS[myPlayer.team]; if (!t) return showWaiting();
      setBg(t.bgTop, t.bgBottom); subtitle.textContent = "Jeu en cours !";
      const required = activeGame.required == null ? 1 : activeGame.required;
      const all = required === 0;
      const selected = (myTeam && Array.isArray(myTeam.selected)) ? myTeam.selected : [];
      const isCaptain = myTeam && myTeam.captain_id === myId;
      const member = (id) => teammates.find((x) => x.id === id);
      let body = `<div class="label">Jeu en cours · Équipe ${t.name}</div><div class="game-theme" style="color:${t.hex}">${escapeHtml(activeGame.theme)}</div><div class="game-req">${all ? "Toute l'équipe joue !" : `Votre équipe envoie ${required} joueur${required > 1 ? "s" : ""}`}</div>`;
      if (all) { body += `<div class="playing">👉 Tout le monde y va — toi aussi ! 💪</div>`; }
      else if (isCaptain) {
        const chips = teammates.map((m) => `<span class="pchip ${selected.includes(m.id) ? "sel" : ""}" data-pick="${m.id}">${avatarImg(m.photo, "av", "👤")}${escapeHtml(m.name)}</span>`).join("");
        body += `<div class="pick">${chips}</div><div class="pickcount">${selected.length}/${required} choisi${selected.length > 1 ? "s" : ""}</div>`;
        if (selected.includes(myId)) body += `<div class="playing">👉 Tu joues aussi !</div>`;
      } else {
        if (!myTeam || !myTeam.captain_id) body += `<div class="waitchef">Aucun chef désigné pour ton équipe — voir l'organisateur.</div>`;
        else if (selected.length === 0) body += `<div class="waitchef">⏳ Ton chef choisit les joueurs…</div>`;
        else {
          const chips = selected.map((id) => { const m = member(id); return `<span class="pchip">${avatarImg(m ? m.photo : null, "av", "👤")}${escapeHtml(m ? m.name : "?")}</span>`; }).join("");
          body += `<div class="chosen-list">${chips}</div>`;
          if (selected.includes(myId)) body += `<div class="playing">👉 C'est toi qui joues !</div>`;
        }
      }
      screen.innerHTML = `<div class="card reveal">${body}<div class="me-pill" style="margin-top:18px">${avatarImg(myPlayer.photo, "me-ava", "👤")} ${escapeHtml(myPlayer.name)}</div></div>`;
      if (!all && isCaptain) screen.querySelectorAll("[data-pick]").forEach((el) => el.addEventListener("click", () => togglePick(el.dataset.pick, required)));
    }

    async function togglePick(pid, required) {
      let sel = (myTeam && Array.isArray(myTeam.selected)) ? myTeam.selected.slice() : [];
      if (sel.includes(pid)) sel = sel.filter((x) => x !== pid);
      else if (sel.length < required) sel.push(pid);
      else return;
      myTeam.selected = sel; showGame();
      const { error } = await supabase.from("teams").update({ selected: sel }).eq("id", myPlayer.team);
      if (error) alert("Erreur : " + error.message);
    }

    // ---------- OTHER VIEWS ----------
    function classementView() {
      resetBg(); subtitle.textContent = "Le classement en direct";
      const medals = ["🥇","🥈","🥉","4️⃣"];
      const ranked = [1,2,3,4].map((t) => ({ t, total: teamTotal(t) })).sort((a, b) => b.total - a.total || a.t - b.t);
      const rows = ranked.map((r, i) => {

        return `<div class="brow ${r.t === (myPlayer && myPlayer.team) ? "me" : ""}"><span class="brank">${medals[i]}</span>${ava}<span class="bname">${escapeHtml(teamDisplayName(r.t))}</span><span class="bpts">${r.total} pts</span></div>`;
      }).join("");
      screen.innerHTML = `<div class="card board"><h3>🏆 Classement</h3>${rows}</div>`;

    function placeholderView(ico, title, text) {
      resetBg(); subtitle.textContent = "";
      screen.innerHTML = `<div class="card placeholder"><div class="ico">${ico}</div><h2>${title}</h2><p>${text}</p><p>🚧 Bientôt disponible !</p></div>`;
    }

    // ---------- DÉFIS ----------
    function defiStatus(d) {
      const subs = mySubs.filter((s) => s.defi === d.key);
      const approved = subs.filter((s) => s.status === "approved");
      const pending = subs.filter((s) => s.status === "pending");
      return { approved: approved.length, pending: pending.length, done: approved.length > 0 };
    }
    function defisView() {
      resetBg(); subtitle.textContent = "Des points cachés à grappiller…";
      const hasTeam = myPlayer && myPlayer.team;
      const intro = `<div class="card defi-intro"><div class="ico">🎯</div><p>Relevez ces défis tout au long de la journée pour rapporter des points à votre équipe. <strong>Surprise :</strong> ces points restent cachés et seront révélés d'un coup à la grande finale ! 🤫</p>${hasTeam ? "" : `<p class="defi-locked">🔒 Les défis s'activent dès que les équipes sont tirées.</p>`}</div>`;
      const cards = DEFIS.map((d) => {
        const st = defiStatus(d);
        let badge = "", action = "";
        if (d.repeatable) {
          badge = `<span class="defi-count">${st.approved} validé${st.approved > 1 ? "s" : ""}${st.pending ? ` · ${st.pending} en attente` : ""}</span>`;
          if (hasTeam) action = `<button class="defi-btn" data-photo="${d.key}">📸 Envoyer une preuve</button>`;
        } else if (st.done) {
          badge = `<span class="defi-ok">✓ Validé !</span>`;
        } else if (st.pending) {
          badge = `<span class="defi-pending">⏳ En attente de validation…</span>`;
        } else if (d.mode === "live") {
          badge = `<span class="defi-todo">🎤 À faire en live devant l'orga</span>`;
        } else if (hasTeam) {
          if (d.mode === "photo") action = `<button class="defi-btn" data-photo="${d.key}">📸 Envoyer ma preuve</button>`;
          else if (d.mode === "declaration") action = `<button class="defi-btn" data-declare="${d.key}">🕵️ Déclarer le coup</button>`;
        }
        return `<div class="card defi-card"><div class="defi-head"><span class="defi-emoji">${d.emoji}</span><div class="defi-titles"><div class="defi-title">${d.title}</div><div class="defi-pts">${d.points} pt${d.points > 1 ? "s" : ""}${d.repeatable ? " / preuve" : ""}</div></div></div><p class="defi-rule">${d.rule}</p>${(d.key === "mot_espion" && hasTeam) ? `<div class="secret-inline">🔑 Votre mot secret : <b>${escapeHtml(SECRET_WORDS[myPlayer.team])}</b></div>` : ""}<div class="defi-foot">${badge}${action}</div><div class="defi-msg" id="msg-${d.key}"></div></div>`;
      }).join("");
      screen.innerHTML = intro + cards;
      screen.querySelectorAll("[data-photo]").forEach((b) => b.addEventListener("click", () => sendPhoto(b.dataset.photo)));
      screen.querySelectorAll("[data-declare]").forEach((b) => b.addEventListener("click", () => openDeclare(b.dataset.declare)));
    }

    let photoTarget = null, fileEl = null;
    function ensureFileInput() {
      if (fileEl) return fileEl;
      fileEl = document.createElement("input");
      fileEl.type = "file"; fileEl.accept = "image/*"; fileEl.hidden = true;
      fileEl.addEventListener("change", async () => {
        const file = fileEl.files[0]; fileEl.value = "";
        if (!file || !photoTarget) return;
        const key = photoTarget; photoTarget = null;
        const msg = document.getElementById("msg-" + key);
        if (msg) { msg.style.color = "var(--muted)"; msg.textContent = "Envoi en cours…"; }
        try {
          const photo = await compressImage(file);
          await submitDefi(key, { photo });
        } catch { if (msg) { msg.style.color = "#c0392b"; msg.textContent = "Oups, image illisible."; } }
      });
      document.body.appendChild(fileEl);
      return fileEl;
    }
    function sendPhoto(key) { photoTarget = key; ensureFileInput().click(); }

    function openDeclare(key) {
      const card = document.getElementById("msg-" + key); if (!card) return;
      const d = DEFI_BY_KEY[key];
      card.innerHTML = `<div class="declare-box"><textarea id="decl-text" maxlength="160" placeholder="Ex : on a fait dire « banane » à Tonton Seb !"></textarea><div class="declare-row"><div class="avatar-preview sm" id="decl-prev">📷</div><label class="photo-btn">Selfie (option)<input id="decl-photo" type="file" accept="image/*" hidden /></label><button class="defi-btn" id="decl-send">Envoyer</button></div></div>`;
      let declPhoto = null;
      const prev = document.getElementById("decl-prev"), pInput = document.getElementById("decl-photo");
      pInput.addEventListener("change", async () => { const f = pInput.files[0]; if (!f) return; try { declPhoto = await compressImage(f); prev.innerHTML = `<img src="${declPhoto}" alt="" />`; } catch {} });
      document.getElementById("decl-send").addEventListener("click", async () => {
        const note = document.getElementById("decl-text").value.trim();
        if (!note) { document.getElementById("decl-text").focus(); return; }
        await submitDefi(key, { note, photo: declPhoto });
      });
    }

    async function submitDefi(key, { photo = null, note = null }) {
      const d = DEFI_BY_KEY[key];
      const { error } = await supabase.from("submissions").insert({ defi: key, team: myPlayer.team, player_id: myId, photo, note, points: d.points, status: "pending" });
      if (error) { const msg = document.getElementById("msg-" + key); if (msg) { msg.style.color = "#c0392b"; msg.textContent = "Erreur : " + error.message; } return; }
      await loadSubs(); defisView();
      const msg = document.getElementById("msg-" + key);
      if (msg) { msg.style.color = "#1f9d63"; msg.textContent = "✓ Envoyé ! En attente de validation 🤫"; }
    }

    // ---------- FINALE : calculs ----------
    function defiPointsP(t) {
      let total = 0; const seen = new Set();
      approvedSubs.filter((s) => s.team === t).forEach((s) => { const d = DEFI_BY_KEY[s.defi]; if (d && !d.repeatable) { if (seen.has(s.defi)) return; seen.add(s.defi); } total += s.points; });
      return total;
    }
    function awardResults() {
      const res = {};
      AWARDS.forEach((a) => {
        const counts = {};
        allVotes.filter((v) => v.category === a.key).forEach((v) => (counts[v.candidate_id] = (counts[v.candidate_id] || 0) + 1));
        let max = 0; Object.values(counts).forEach((c) => { if (c > max) max = c; });
        let winners = [];
        if (max > 0) winners = Object.keys(counts).filter((id) => counts[id] === max).map((id) => allPlayers.find((p) => p.id === id)).filter(Boolean);
        res[a.key] = { award: a, winners, max };
      });
      return res;
    }
    function awardPointsP(t, results) {
      let total = 0;
      AWARDS.forEach((a) => { const r = results[a.key]; if (!r || !r.winners.length) return; if (new Set(r.winners.map((w) => w.team)).has(t)) total += a.points; });
      return total;
    }
    function finalTotal(t, results) { return teamTotal(t) + defiPointsP(t) + awardPointsP(t, results); }

    // ---------- FINALE : vote ----------
    async function castVote(category, candidateId) {
      myVotes[category] = candidateId; openCat = null; voteView();
      const { error } = await supabase.from("votes").upsert({ category, voter_id: myId, candidate_id: candidateId }, { onConflict: "category,voter_id" });
      if (error) alert("Erreur vote : " + error.message);
    }
    function voteView() {
      resetBg(); subtitle.textContent = "Élis les héros de la journée !";
      const others = allPlayers.filter((p) => !myPlayer.team || p.team !== myPlayer.team);
      const cards = AWARDS.map((a) => {
        const chosenId = myVotes[a.key];
        const chosen = chosenId ? allPlayers.find((p) => p.id === chosenId) : null;
        let inner;
        if (openCat === a.key) {
          const chips = others.map((p) => `<span class="vchip ${chosenId === p.id ? "sel" : ""}" data-vote="${a.key}|${p.id}">${avatarImg(p.photo, "av", "👤")}${escapeHtml(p.name)}</span>`).join("") || `<span class="defi-todo">Personne à élire…</span>`;
          inner = `<div class="vote-grid">${chips}</div>`;
        } else if (chosen) {
          inner = `<div class="vote-chosen">${avatarImg(chosen.photo, "me-ava", "👤")} <b>${escapeHtml(chosen.name)}</b> <button class="vchange" data-open="${a.key}">changer</button></div>`;
        } else {
          inner = `<button class="defi-btn" data-open="${a.key}">Choisir</button>`;
        }
        return `<div class="card defi-card"><div class="defi-head"><span class="defi-emoji">${a.emoji}</span><div class="defi-titles"><div class="defi-title">${escapeHtml(a.title)}</div><div class="defi-pts">+${a.points} pts à l'équipe du gagnant</div></div></div>${inner}</div>`;
      }).join("");
      const voted = AWARDS.filter((a) => myVotes[a.key]).length;
      const intro = `<div class="card defi-intro"><div class="ico">🗳️</div><p>Vote pour un cousin ou une cousine <strong>d'une autre équipe</strong> dans chaque catégorie. Tu peux changer tant que c'est ouvert !</p><p class="defi-pts" style="margin-top:8px">${voted}/${AWARDS.length} catégories votées</p></div>`;
      screen.innerHTML = intro + cards;
      screen.querySelectorAll("[data-open]").forEach((b) => b.addEventListener("click", () => { openCat = b.dataset.open; voteView(); }));
      screen.querySelectorAll("[data-vote]").forEach((b) => b.addEventListener("click", () => { const [c, p] = b.dataset.vote.split("|"); castVote(c, p); }));
    }

    // ---------- FINALE : révélation ----------
    function revealView() {
      resetBg();
      const results = awardResults();
      const s = revealStep;
      const medals = ["🥇","🥈","🥉","4️⃣"];
      if (s <= 2) {
        const showDefis = s >= 1, showAwards = s >= 2;
        subtitle.textContent = s === 0 ? "🥁 Les scores des jeux…" : s === 1 ? "🎯 Les points cachés des défis !" : "🏅 La remise des prix !";
        let awardsHtml = "";
        if (showAwards) {
          awardsHtml = `<div class="card"><h3 style="font-family:'Fredoka';text-align:center;margin:0 0 12px">🏅 Les prix de la journée</h3>` + AWARDS.map((a) => {
            const r = results[a.key];
            const w = r.winners.length ? r.winners.map((p) => `<span class="award-win">${avatarImg(p.photo, "av", "👤")}${escapeHtml(p.name)}</span>`).join(" ") : `<span class="defi-todo">— pas de vote —</span>`;
            return `<div class="award-row"><span class="defi-emoji">${a.emoji}</span><div style="flex:1;text-align:left"><div class="defi-title" style="font-size:1.05rem">${escapeHtml(a.title)}</div><div style="margin-top:4px">${w}</div></div></div>`;
          }).join("") + `</div>`;
        }
        const ranked = [1,2,3,4].map((t) => ({ t, base: teamTotal(t), dp: showDefis ? defiPointsP(t) : 0, ap: showAwards ? awardPointsP(t, results) : 0 }))
          .map((o) => ({ ...o, total: o.base + o.dp + o.ap })).sort((a, b) => b.total - a.total || a.t - b.t);
        const rows = ranked.map((r) => {
          const ph = allTeams[r.t] && allTeams[r.t].photo;
          const ava = ph ? `<img class="bava" src="${ph}" alt="" />` : `<span class="bswatch" style="background:${TEAMS[r.t].hex}"></span>`;
          const add = `${r.dp ? `<span class="rev-add">+${r.dp}🎯</span>` : ""}${r.ap ? `<span class="rev-add">+${r.ap}🏅</span>` : ""}`;
          return `<div class="brow">${ava}<span class="bname">${escapeHtml(teamDisplayName(r.t))}</span>${add}<span class="bpts">${r.total}</span></div>`;
        }).join("");
        screen.innerHTML = `${awardsHtml}<div class="card board"><h3>Classement provisoire</h3>${rows}</div><div class="card defi-intro"><p>La révélation finale arrive… 🤫</p></div>`;
        return;
      }
      subtitle.textContent = "🏆 Le classement final !";
      const ranking = [1,2,3,4].map((t) => ({ t, total: finalTotal(t, results) })).sort((a, b) => b.total - a.total || teamTotal(b.t) - teamTotal(a.t) || a.t - b.t);
      const revealedCount = Math.min(4, s - 2);
      const rows = ranking.map((r, idx) => {
        const shown = idx >= (4 - revealedCount);
        if (!shown) return `<div class="prow hide"><span class="brank">${medals[idx]}</span><span class="bname" style="color:var(--muted)">🤔 ? ? ?</span></div>`;
        const ph = allTeams[r.t] && allTeams[r.t].photo;
        const ava = ph ? `<img class="pava" src="${ph}" alt="" />` : `<span class="pbadge" style="background:${TEAMS[r.t].hex}">${TEAMS[r.t].emoji}</span>`;
        return `<div class="prow show${idx === 0 ? " champ" : ""}" style="border-color:${TEAMS[r.t].hex}"><span class="brank">${medals[idx]}</span>${ava}<span class="bname" style="color:${TEAMS[r.t].hex}">${escapeHtml(teamDisplayName(r.t))}</span><span class="bpts">${r.total}</span></div>`;
      }).join("");
      const champ = revealedCount >= 4
        ? `<div class="card defi-intro"><div class="ico">🎉🏆🎉</div><p><strong>${escapeHtml(teamDisplayName(ranking[0].t))}</strong> remporte l'Edward D'or ${new Date().getFullYear()} !</p></div>`
        : `<div class="card defi-intro"><p>Suspense… 🥁</p></div>`;
      screen.innerHTML = `<div class="card board"><h3>🏆 Podium final</h3>${rows}</div>${champ}`;
    }

    // ---------- ROUTER ----------
    function renderCurrent() {
      if (!myPlayer) { burger.hidden = true; menu.hidden = true; showJoinForm(); return; }
      if (finalePhase === "voting") { burger.hidden = true; menu.hidden = true; return voteView(); }
      if (finalePhase === "reveal") { burger.hidden = true; menu.hidden = true; return revealView(); }
      burger.hidden = false; updateMenuActive();
      if (currentView === "classement") return classementView();
      if (currentView === "palmares") return placeholderView("🏅", "Palmarès", "Les vainqueurs des éditions passées s'afficheront ici.");
      if (currentView === "defis") return defisView();
      if (!myPlayer.team) { showWaiting(); return; }
      if (activeGame) { showGame(); return; }
      const typing = document.activeElement && ["teamNameInput"].includes(document.activeElement.id);
      if (!typing) showReveal();
    }

    // ---------- REALTIME (rechargements ciblés) ----------
    async function onTeams() { await loadTeams(); renderCurrent(); }
    async function onScores() { await loadScores(); renderCurrent(); }
    async function onGames() { await loadActiveGame(); if (myPlayer && myPlayer.team && activeGame) await loadTeammates(); renderCurrent(); }
    async function onSubs() { await loadSubs(); if (finalePhase !== "playing") { await loadApprovedP(); renderCurrent(); } else if (currentView === "defis") defisView(); }
    async function onState() { await loadState(); if (finalePhase !== "playing" && !allPlayers.length) await loadFinale(); renderCurrent(); }
    async function onVotes() { if (finalePhase !== "playing") { await loadVotesP(); renderCurrent(); } }
    function subscribeRealtime() {
      supabase.channel("player-watch")
        .on("postgres_changes", { event:"INSERT", schema:"public", table:"players" }, () => updateCount())
        .on("postgres_changes", { event:"UPDATE", schema:"public", table:"players" }, async (p) => { if (p.new.id === myId) { myPlayer = p.new; if (myPlayer.team && activeGame) await loadTeammates(); renderCurrent(); } })
        .on("postgres_changes", { event:"DELETE", schema:"public", table:"players" }, (p) => { if (p.old.id === myId) { localStorage.removeItem(STORAGE_KEY); myId = null; myPlayer = null; myTeam = null; currentView = "main"; renderCurrent(); } })
        .on("postgres_changes", { event:"*", schema:"public", table:"teams" }, () => onTeams())
        .on("postgres_changes", { event:"*", schema:"public", table:"games" }, () => onGames())
        .on("postgres_changes", { event:"*", schema:"public", table:"scores" }, () => onScores())
        .on("postgres_changes", { event:"*", schema:"public", table:"submissions" }, () => onSubs())
        .on("postgres_changes", { event:"*", schema:"public", table:"state" }, () => onState())
        .on("postgres_changes", { event:"*", schema:"public", table:"votes" }, () => onVotes())
        .subscribe();
    }

    async function refreshState() {
      if (!myId) return;
      const { data } = await supabase.from("players").select("*").eq("id", myId).maybeSingle();
      if (data) { myPlayer = data; await loadContext(); renderCurrent(); }
      else { localStorage.removeItem(STORAGE_KEY); myId = null; myPlayer = null; myTeam = null; renderCurrent(); }
    }
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") refreshState(); });
    window.addEventListener("focus", refreshState);
    window.addEventListener("online", refreshState);

    async function init() {
      if (myId) {
        const { data } = await supabase.from("players").select("*").eq("id", myId).maybeSingle();
        if (data) { myPlayer = data; await loadContext(); }
        else { localStorage.removeItem(STORAGE_KEY); myId = null; }
      }
      renderCurrent();
      subscribeRealtime();
    }
    init();
  </script>
</body>
</html>
