<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edward D'or</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg-top:#ffe7b8; --bg-bottom:#ffd2a6; --card:#fffaf3; --ink:#3a2e22; --muted:#8a7a66; --accent:#ff6b4a; --accent-dark:#e8543a; --ring:rgba(255,107,74,0.35); --pill:#fff0e6; --line:#f0e3d4; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Nunito",system-ui,sans-serif; color:var(--ink); background:linear-gradient(170deg,var(--bg-top),var(--bg-bottom)); display:flex; justify-content:center; padding:24px 18px 48px; transition:background .5s ease; }
    .container { width:100%; max-width:460px; }
    .topbar { display:flex; align-items:center; justify-content:center; position:relative; }
    h1 { font-family:"Fredoka",sans-serif; font-weight:700; font-size:2rem; margin:0; letter-spacing:-0.5px; }
    .burger { position:absolute; right:0; top:50%; transform:translateY(-50%); background:#fffaf3; border:2px solid var(--line); border-radius:12px; width:44px; height:44px; font-size:1.3rem; cursor:pointer; color:var(--ink); display:flex; align-items:center; justify-content:center; }
    .burger[hidden] { display:none; }
    .subtitle { margin:6px 0 22px; color:var(--muted); font-weight:700; font-size:0.95rem; text-align:center; min-height:1.1em; }
    .card { background:var(--card); border-radius:22px; padding:22px; box-shadow:0 12px 30px rgba(120,70,30,0.12); }
    label { display:block; font-weight:800; margin:0 0 10px; font-size:1.05rem; }
    .field { margin-bottom:20px; }
    input[type=text] { width:100%; font-family:inherit; font-size:1.1rem; padding:14px 16px; border:2px solid var(--line); border-radius:14px; background:#fff; color:var(--ink); outline:none; transition:border-color .15s,box-shadow .15s; }
    input[type=text]:focus { border-color:var(--accent); box-shadow:0 0 0 4px var(--ring); }
    .choices { display:flex; gap:10px; } .choices.wrap { flex-wrap:wrap; gap:8px; }
    .choice { flex:1; display:flex; align-items:center; justify-content:center; text-align:center; font-family:"Fredoka",sans-serif; font-weight:600; font-size:1.05rem; padding:13px 8px; border:2px solid var(--line); border-radius:14px; background:#fff; color:var(--ink); cursor:pointer; transition:all .12s; }
    .choices.wrap .choice { flex:1 1 30%; min-width:92px; font-size:0.98rem; padding:12px 8px; }
    .choice.selected { border-color:var(--accent); background:var(--pill); color:var(--accent-dark); }
    button.cta { width:100%; font-family:"Fredoka",sans-serif; font-weight:600; font-size:1.15rem; color:#fff; background:var(--accent); border:none; border-radius:14px; padding:16px; cursor:pointer; transition:background .15s,transform .05s; }
    button.cta:hover { background:var(--accent-dark); } button.cta:active { transform:translateY(1px); } button.cta:disabled { opacity:0.5; }

    .photo-pick { display:flex; align-items:center; gap:14px; }
    .avatar-preview { width:64px; height:64px; border-radius:50%; background:var(--pill); display:flex; align-items:center; justify-content:center; font-size:1.6rem; overflow:hidden; flex:none; border:2px solid var(--line); }
    .avatar-preview img { width:100%; height:100%; object-fit:cover; }
    .photo-btn { font-family:"Fredoka",sans-serif; font-weight:600; font-size:0.95rem; padding:12px 16px; border:2px solid var(--line); border-radius:12px; background:#fff; color:var(--ink); cursor:pointer; }

    .waiting { text-align:center; }
    .waiting .big { font-family:"Fredoka",sans-serif; font-size:1.5rem; font-weight:700; margin:4px 0 6px; }
    .waiting .hint { color:var(--muted); font-weight:700; margin:0 0 20px; }
    .spinner { width:46px; height:46px; margin:8px auto 20px; border-radius:50%; border:5px solid var(--line); border-top-color:var(--accent); animation:spin .9s linear infinite; }
    .count-badge { display:inline-block; background:var(--pill); color:var(--accent-dark); font-family:"Fredoka",sans-serif; font-weight:600; border-radius:999px; padding:8px 16px; font-size:1rem; }

    .reveal { text-align:center; padding:8px 0; }
    .reveal .label { font-weight:800; color:var(--muted); letter-spacing:0.5px; text-transform:uppercase; font-size:0.8rem; }
    .team-badge { margin:16px auto; width:140px; height:140px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:3.6rem; box-shadow:0 14px 34px rgba(0,0,0,0.18); animation:pop-in .5s cubic-bezier(.2,1.4,.4,1); overflow:hidden; }
    .team-badge img { width:100%; height:100%; object-fit:cover; }
    .team-name { font-family:"Fredoka",sans-serif; font-size:2rem; font-weight:700; margin:4px 0; line-height:1.1; }
    .team-sub { color:var(--muted); font-weight:700; }
    .me-pill { margin-top:16px; display:inline-flex; gap:8px; align-items:center; background:#fff; border:2px solid var(--line); border-radius:999px; padding:6px 16px 6px 6px; font-weight:800; }
    .me-ava { width:30px; height:30px; border-radius:50%; object-fit:cover; flex:none; }
    .me-ava.ph { background:var(--pill); display:flex; align-items:center; justify-content:center; font-size:1rem; }

    .captain-box { margin-top:22px; padding-top:20px; border-top:2px dashed var(--line); }
    .captain-badge { font-family:"Fredoka",sans-serif; font-weight:700; color:var(--accent-dark); background:var(--pill); display:inline-block; padding:7px 16px; border-radius:999px; margin-bottom:14px; }
    .chef-panel { background:var(--pill); border-radius:16px; padding:16px; text-align:left; }
    .chef-panel .lbl { font-weight:800; font-size:0.92rem; color:var(--ink); margin-bottom:10px; }
    .chef-panel .row { display:flex; gap:10px; }
    .chef-panel input[type=text] { flex:1; min-width:0; font-size:1rem; padding:12px 14px; }
    .chef-panel button.save { font-family:"Fredoka",sans-serif; font-weight:600; color:#fff; background:var(--accent); border:none; border-radius:14px; padding:0 20px; cursor:pointer; white-space:nowrap; }
    .chef-panel button.save:hover { background:var(--accent-dark); } .chef-panel button.save:disabled { opacity:0.55; }
    .chef-photo { display:flex; align-items:center; gap:14px; margin:14px 0 4px; }
    .saved { color:#1f9d63; font-weight:800; font-size:0.9rem; margin-top:10px; min-height:1.1em; }
    .editbtn { margin-top:18px; font-family:"Fredoka",sans-serif; font-weight:600; font-size:0.95rem; padding:11px 18px; border:2px solid var(--line); border-radius:12px; background:#fff; color:var(--ink); cursor:pointer; }

    .game-theme { font-family:"Fredoka",sans-serif; font-size:1.9rem; font-weight:700; margin-top:14px; }
    .game-req { color:var(--muted); font-weight:800; margin-top:4px; }
    .pick { display:flex; flex-wrap:wrap; gap:8px; margin-top:18px; justify-content:center; }
    .pchip { display:inline-flex; align-items:center; gap:8px; padding:8px 14px 8px 8px; border:2px solid var(--line); border-radius:999px; font-weight:800; cursor:pointer; background:#fff; transition:all .12s; }
    .pchip.sel { background:var(--accent); border-color:var(--accent); color:#fff; }
    .pchip .av { width:26px; height:26px; border-radius:50%; object-fit:cover; flex:none; background:var(--pill); display:inline-flex; align-items:center; justify-content:center; font-size:0.85rem; }
    .pickcount { font-family:"Fredoka",sans-serif; font-weight:600; margin-top:14px; color:var(--muted); }
    .chosen-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; justify-content:center; }
    .playing { margin-top:16px; background:#e7f7ee; border:2px solid #aee6c7; color:#14784a; border-radius:14px; padding:16px; font-family:"Fredoka",sans-serif; font-weight:700; font-size:1.3rem; }
    .waitchef { color:var(--muted); font-weight:700; margin-top:16px; }

    .board h3 { font-family:"Fredoka",sans-serif; font-size:1.3rem; margin:0 0 16px; text-align:center; }
    .brow { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:14px; margin-bottom:8px; background:#fff; border:2px solid var(--line); font-weight:800; }
    .brow.me { border-color:var(--accent); background:var(--pill); }
    .brank { font-size:1.2rem; flex:none; }
    .bava { width:30px; height:30px; border-radius:50%; object-fit:cover; flex:none; }
    .bswatch { width:16px; height:16px; border-radius:50%; flex:none; }
    .bname { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:left; }
    .bpts { font-family:"Fredoka",sans-serif; font-weight:700; flex:none; }

    .placeholder { text-align:center; padding:20px 0; }
    .placeholder .ico { font-size:3.4rem; margin-bottom:10px; }
    .placeholder h2 { font-family:"Fredoka",sans-serif; margin:0 0 8px; }
    .placeholder p { color:var(--muted); font-weight:700; margin:4px 0; }

    .menu { position:fixed; inset:0; background:rgba(58,46,34,0.5); display:flex; justify-content:flex-end; z-index:50; }
    .menu[hidden] { display:none; }
    .menu-inner { background:var(--card); width:82%; max-width:320px; height:100%; padding:22px 18px; display:flex; flex-direction:column; gap:10px; box-shadow:-10px 0 40px rgba(0,0,0,0.25); }
    .menu-close { align-self:flex-end; background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--muted); margin-bottom:6px; padding:4px 8px; }
    .menu-inner a { font-family:"Fredoka",sans-serif; font-weight:600; font-size:1.2rem; padding:16px 18px; border-radius:14px; background:#fff; border:2px solid var(--line); color:var(--ink); cursor:pointer; }
    .menu-inner a.active { border-color:var(--accent); background:var(--pill); color:var(--accent-dark); }

    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes pop-in { from { opacity:0; transform:scale(0.4); } to { opacity:1; transform:scale(1); } }
    @media (prefers-reduced-motion:reduce) { .spinner,.team-badge { animation:none; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="topbar"><h1>🏆 Edward D'or</h1><button id="burger" class="burger" hidden>☰</button></div>
      <p class="subtitle" id="subtitle">Rejoins la partie !</p>
    </header>
    <div id="screen"></div>
  </div>

  <div id="menu" class="menu" hidden>
    <div class="menu-inner">
      <button class="menu-close" id="menuClose">✕</button>
      <a data-view="main">🎮 Le jeu</a>
      <a data-view="classement">🏆 Classement</a>
      <a data-view="palmares">🏅 Palmarès</a>
      <a data-view="defis">🎯 Défis</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const SUPABASE_URL = "https://bzspxqvbbdtefhugjogt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_nAUDhRZoY7cd4FBRLACU5A_oule5R-0";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const TEAMS = {
      1: { name:"Rouge", emoji:"🔴", hex:"#e23b2e", bgTop:"#ffd9d4", bgBottom:"#ffc1b8" },
      2: { name:"Bleu",  emoji:"🔵", hex:"#2f6df0", bgTop:"#d6e4ff", bgBottom:"#bcd2ff" },
      3: { name:"Vert",  emoji:"🟢", hex:"#1f9d63", bgTop:"#cdf2df", bgBottom:"#b2ead0" },
      4: { name:"Jaune", emoji:"🟡", hex:"#e8a200", bgTop:"#ffeec2", bgBottom:"#ffe29b" },
    };
    const FAMILIES = [ {val:"MOUDA",label:"Mouda"}, {val:"POIRIER",label:"Poirier"}, {val:"BOUVIER",label:"Bouvier"}, {val:"DOUKHAN/DAINNE",label:"Doukhan/Dainne"}, {val:"AUTRE",label:"Autre"} ];
    const STORAGE_KEY = "cousinade_player_id";

    const screen = document.getElementById("screen");
    const subtitle = document.getElementById("subtitle");
    const burger = document.getElementById("burger");
    const menu = document.getElementById("menu");

    let myId = localStorage.getItem(STORAGE_KEY);
    let myPlayer = null, myTeam = null, activeGame = null, teammates = [], allTeams = {}, scoresData = [];
    let currentView = "main", editorOpen = false;

    function setBg(top, bottom) { document.body.style.background = `linear-gradient(170deg, ${top}, ${bottom})`; }
    function resetBg() { setBg("#ffe7b8", "#ffd2a6"); }
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
    const teamTotal = (t) => scoresData.filter((s) => s.team === t).reduce((a, s) => a + s.points, 0);
    const teamDisplayName = (t) => (allTeams[t] && allTeams[t].name && allTeams[t].name.trim()) ? allTeams[t].name : `Équipe ${TEAMS[t].name}`;

    function compressImage(file, max = 320, quality = 0.72) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const side = Math.min(img.width, img.height);
            const sx = (img.width - side) / 2, sy = (img.height - side) / 2;
            const canvas = document.createElement("canvas");
            canvas.width = max; canvas.height = max;
            canvas.getContext("2d").drawImage(img, sx, sy, side, side, 0, 0, max, max);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.onerror = reject; img.src = reader.result;
        };
        reader.onerror = reject; reader.readAsDataURL(file);
      });
    }

    // ---------- MENU ----------
    burger.addEventListener("click", () => { menu.hidden = false; });
    document.getElementById("menuClose").addEventListener("click", () => { menu.hidden = true; });
    menu.addEventListener("click", (e) => { if (e.target === menu) menu.hidden = true; });
    menu.querySelectorAll("a[data-view]").forEach((a) => a.addEventListener("click", () => { currentView = a.dataset.view; menu.hidden = true; renderCurrent(); }));
    function updateMenuActive() { menu.querySelectorAll("a[data-view]").forEach((a) => a.classList.toggle("active", a.dataset.view === currentView)); }

    // ---------- DATA ----------
    async function loadTeams() {
      const { data } = await supabase.from("teams").select("*");
      allTeams = {}; (data || []).forEach((t) => (allTeams[t.id] = t));
      myTeam = (myPlayer && myPlayer.team) ? (allTeams[myPlayer.team] || null) : null;
    }
    async function loadScores() { const { data } = await supabase.from("scores").select("team,points"); scoresData = data || []; }
    async function loadActiveGame() { const { data } = await supabase.from("games").select("*").eq("status", "active").maybeSingle(); activeGame = data || null; }
    async function loadTeammates() {
      if (!myPlayer || !myPlayer.team) { teammates = []; return; }
      const { data } = await supabase.from("players").select("id,name,photo").eq("team", myPlayer.team).order("name");
      teammates = data || [];
    }
    async function loadContext() {
      if (!myPlayer) return;
      await loadTeams(); await loadScores(); await loadActiveGame();
      if (myPlayer.team && activeGame) await loadTeammates(); else teammates = [];
    }

    // ---------- JOIN ----------
    function showJoinForm() {
      resetBg(); subtitle.textContent = "Rejoins la partie !";
      let sex = null, age = null, fam = null, photo = null;
      const famHtml = FAMILIES.map((f) => `<div class="choice" data-val="${f.val}">${f.label}</div>`).join("");
      screen.innerHTML = `
        <div class="card">
          <div class="field"><label for="nameInput">Ton prénom</label><input id="nameInput" type="text" placeholder="Ex : Léa" autocomplete="off" maxlength="40" /></div>
          <div class="field"><label>Photo (optionnel)</label>
            <div class="photo-pick"><div class="avatar-preview" id="avPreview">📷</div>
            <label class="photo-btn">Ajouter une photo<input id="photoInput" type="file" accept="image/*" hidden /></label></div>
          </div>
          <div class="field"><label>Tu es</label><div class="choices" id="sexChoices"><div class="choice" data-val="H">Homme</div><div class="choice" data-val="F">Femme</div></div></div>
          <div class="field"><label>Catégorie</label><div class="choices" id="ageChoices"><div class="choice" data-val="jeune">Jeune</div><div class="choice" data-val="senior">Plus trop jeune (essaye de l'être)</div></div></div>
          <div class="field"><label>Ta famille</label><div class="choices wrap" id="famChoices">${famHtml}</div></div>
          <button class="cta" id="joinBtn">C'est parti !</button>
        </div>`;
      const nameInput = document.getElementById("nameInput"), joinBtn = document.getElementById("joinBtn");
      const photoInput = document.getElementById("photoInput"), avPreview = document.getElementById("avPreview");
      photoInput.addEventListener("change", async () => {
        const file = photoInput.files[0]; if (!file) return;
        try { photo = await compressImage(file); avPreview.innerHTML = `<img src="${photo}" alt="" />`; }
        catch { alert("Impossible de lire cette image."); }
      });
      function wire(id, setter) { const c = document.getElementById(id); c.querySelectorAll(".choice").forEach((el) => el.addEventListener("click", () => { c.querySelectorAll(".choice").forEach((x) => x.classList.remove("selected")); el.classList.add("selected"); setter(el.dataset.val); })); }
      wire("sexChoices", (v) => (sex = v)); wire("ageChoices", (v) => (age = v)); wire("famChoices", (v) => (fam = v));
      joinBtn.addEventListener("click", async () => {
        const name = nameInput.value.trim();
        if (!name) { nameInput.focus(); return; }
        if (!sex) { alert("Choisis Homme ou Femme 🙂"); return; }
        if (!age) { alert("Choisis ta catégorie 🙂"); return; }
        if (!fam) { alert("Choisis ta famille 🙂"); return; }
        joinBtn.disabled = true; joinBtn.textContent = "On t'inscrit…";
        const { data, error } = await supabase.from("players").insert({ name, sex, age_group: age, family: fam, photo }).select().single();
        if (error) { alert("Oups : " + error.message); joinBtn.disabled = false; joinBtn.textContent = "C'est parti !"; return; }
        myPlayer = data; myId = data.id; localStorage.setItem(STORAGE_KEY, myId);
        currentView = "main"; await loadContext(); renderCurrent();
      });
    }

    // ---------- HELPERS ----------
    function avatarImg(photo, cls, fallback) {
      return photo ? `<img class="${cls}" src="${photo}" alt="" />` : `<span class="${cls} ph">${fallback || "👤"}</span>`;
    }

    // ---------- MAIN SUB-VIEWS ----------
    function showWaiting() {
      resetBg(); subtitle.textContent = "Tu es bien inscrit·e !";
      screen.innerHTML = `<div class="card waiting"><div class="spinner"></div><p class="big">Salut ${escapeHtml(myPlayer.name)} 👋</p><p class="hint">En attente du tirage des équipes…</p><span class="count-badge" id="countBadge">…</span></div>`;
      updateCount();
    }
    async function updateCount() {
      const badge = document.getElementById("countBadge"); if (!badge) return;
      const { count } = await supabase.from("players").select("*", { count:"exact", head:true });
      badge.textContent = (count ?? 0) + " cousin·e·s inscrit·e·s";
    }

    function showReveal() {
      const t = TEAMS[myPlayer.team]; if (!t) return showWaiting();
      setBg(t.bgTop, t.bgBottom); subtitle.textContent = "Le tirage est fait !";
      const custom = myTeam && myTeam.name && myTeam.name.trim();
      const teamPhoto = myTeam && myTeam.photo;
      const bigName = custom ? escapeHtml(myTeam.name) : `Équipe ${t.name}`;
      const subName = custom ? `Équipe ${t.name}` : "Que le meilleur clan gagne 🏆";
      const isCaptain = myTeam && myTeam.captain_id === myId;
      const badge = teamPhoto ? `<div class="team-badge" style="border:5px solid ${t.hex}"><img src="${teamPhoto}" alt="" /></div>` : `<div class="team-badge" style="background:${t.hex}">${t.emoji}</div>`;

      let captainHtml = "";
      if (isCaptain) {
        const showEditor = editorOpen || !custom;
        if (showEditor) {
          const photoPrev = teamPhoto ? `<img src="${teamPhoto}" alt="" />` : "📷";
          captainHtml = `
            <div class="captain-box">
              <div class="captain-badge">👑 Tu es le chef !</div>
              <div class="chef-panel">
                <div class="lbl">Personnalise ton équipe</div>
                <div class="row"><input id="teamNameInput" type="text" maxlength="30" placeholder="Nom de l'équipe (ex : Les Bisons)" value="${custom ? escapeHtml(myTeam.name) : ""}" /></div>
                <div class="chef-photo"><div class="avatar-preview" id="teamAvPreview">${photoPrev}</div>
                  <label class="photo-btn">Photo d'équipe<input id="teamPhotoInput" type="file" accept="image/*" hidden /></label></div>
                <div class="row" style="margin-top:6px"><button class="save" id="saveTeamBtn" style="flex:1">Valider</button></div>
                <div class="saved" id="savedMsg"></div>
              </div>
            </div>`;
        } else {
          captainHtml = `<div class="captain-box"><div class="captain-badge">👑 Tu es le chef</div><br/><button class="editbtn" id="openEditor">✏️ Modifier mon équipe</button></div>`;
        }
      }
      screen.innerHTML = `<div class="card reveal"><div class="label">Ton équipe</div>${badge}<div class="team-name" style="color:${t.hex}">${bigName}</div><div class="team-sub">${subName}</div><div class="me-pill">${avatarImg(myPlayer.photo, "me-ava", "👤")} ${escapeHtml(myPlayer.name)}</div>${captainHtml}</div>`;

      if (isCaptain) {
        const openBtn = document.getElementById("openEditor");
        if (openBtn) openBtn.addEventListener("click", () => { editorOpen = true; showReveal(); });
        const saveBtn = document.getElementById("saveTeamBtn");
        if (saveBtn) {
          let pendingPhoto; // undefined = inchangée
          const tpInput = document.getElementById("teamPhotoInput"), tpPrev = document.getElementById("teamAvPreview");
          tpInput.addEventListener("change", async () => {
            const file = tpInput.files[0]; if (!file) return;
            try { pendingPhoto = await compressImage(file); tpPrev.innerHTML = `<img src="${pendingPhoto}" alt="" />`; }
            catch { alert("Impossible de lire cette image."); }
          });
          const saved = document.getElementById("savedMsg");
          saveBtn.addEventListener("click", async () => {
            const newName = document.getElementById("teamNameInput").value.trim();
            const patch = { name: newName || null };
            if (pendingPhoto !== undefined) patch.photo = pendingPhoto;
            saveBtn.disabled = true;
            const { error } = await supabase.from("teams").update(patch).eq("id", myPlayer.team);
            saveBtn.disabled = false;
            if (error) { saved.style.color = "#c0392b"; saved.textContent = "Erreur, réessaie."; return; }
            editorOpen = false; await loadTeams(); showReveal();
          });
        }
      }
    }

    function showGame() {
      const t = TEAMS[myPlayer.team]; if (!t) return showWaiting();
      setBg(t.bgTop, t.bgBottom); subtitle.textContent = "Jeu en cours !";
      const required = activeGame.required == null ? 1 : activeGame.required;
      const all = required === 0;
      const selected = (myTeam && Array.isArray(myTeam.selected)) ? myTeam.selected : [];
      const isCaptain = myTeam && myTeam.captain_id === myId;
      const member = (id) => teammates.find((x) => x.id === id);
      let body = `<div class="label">Jeu en cours · Équipe ${t.name}</div><div class="game-theme" style="color:${t.hex}">${escapeHtml(activeGame.theme)}</div><div class="game-req">${all ? "Toute l'équipe joue !" : `Votre équipe envoie ${required} joueur${required > 1 ? "s" : ""}`}</div>`;
      if (all) { body += `<div class="playing">👉 Tout le monde y va — toi aussi ! 💪</div>`; }
      else if (isCaptain) {
        const chips = teammates.map((m) => `<span class="pchip ${selected.includes(m.id) ? "sel" : ""}" data-pick="${m.id}">${avatarImg(m.photo, "av", "👤")}${escapeHtml(m.name)}</span>`).join("");
        body += `<div class="pick">${chips}</div><div class="pickcount">${selected.length}/${required} choisi${selected.length > 1 ? "s" : ""}</div>`;
        if (selected.includes(myId)) body += `<div class="playing">👉 Tu joues aussi !</div>`;
      } else {
        if (!myTeam || !myTeam.captain_id) body += `<div class="waitchef">Aucun chef désigné pour ton équipe — voir l'organisateur.</div>`;
        else if (selected.length === 0) body += `<div class="waitchef">⏳ Ton chef choisit les joueurs…</div>`;
        else {
          const chips = selected.map((id) => { const m = member(id); return `<span class="pchip">${avatarImg(m ? m.photo : null, "av", "👤")}${escapeHtml(m ? m.name : "?")}</span>`; }).join("");
          body += `<div class="chosen-list">${chips}</div>`;
          if (selected.includes(myId)) body += `<div class="playing">👉 C'est toi qui joues !</div>`;
        }
      }
      screen.innerHTML = `<div class="card reveal">${body}<div class="me-pill" style="margin-top:18px">${avatarImg(myPlayer.photo, "me-ava", "👤")} ${escapeHtml(myPlayer.name)}</div></div>`;
      if (!all && isCaptain) screen.querySelectorAll("[data-pick]").forEach((el) => el.addEventListener("click", () => togglePick(el.dataset.pick, required)));
    }

    async function togglePick(pid, required) {
      let sel = (myTeam && Array.isArray(myTeam.selected)) ? myTeam.selected.slice() : [];
      if (sel.includes(pid)) sel = sel.filter((x) => x !== pid);
      else if (sel.length < required) sel.push(pid);
      else return;
      myTeam.selected = sel; showGame();
      const { error } = await supabase.from("teams").update({ selected: sel }).eq("id", myPlayer.team);
      if (error) alert("Erreur : " + error.message);
    }

    // ---------- OTHER VIEWS ----------
    function classementView() {
      resetBg(); subtitle.textContent = "Le classement en direct";
      const medals = ["🥇","🥈","🥉","4️⃣"];
      const ranked = [1,2,3,4].map((t) => ({ t, total: teamTotal(t) })).sort((a, b) => b.total - a.total || a.t - b.t);
      const rows = ranked.map((r, i) => {
        const ph = allTeams[r.t] && allTeams[r.t].photo;
        const ava = ph ? `<img class="bava" src="${ph}" alt="" />` : `<span class="bswatch" style="background:${TEAMS[r.t].hex}"></span>`;
        return `<div class="brow ${r.t === (myPlayer && myPlayer.team) ? "me" : ""}"><span class="brank">${medals[i]}</span>${ava}<span class="bname">${escapeHtml(teamDisplayName(r.t))}</span><span class="bpts">${r.total} pts</span></div>`;
      }).join("");
      screen.innerHTML = `<div class="card board"><h3>🏆 Classement</h3>${rows}</div>`;
    }
    function placeholderView(ico, title, text) {
      resetBg(); subtitle.textContent = "";
      screen.innerHTML = `<div class="card placeholder"><div class="ico">${ico}</div><h2>${title}</h2><p>${text}</p><p>🚧 Bientôt disponible !</p></div>`;
    }

    // ---------- ROUTER ----------
    function renderCurrent() {
      if (!myPlayer) { burger.hidden = true; menu.hidden = true; showJoinForm(); return; }
      burger.hidden = false; updateMenuActive();
      if (currentView === "classement") return classementView();
      if (currentView === "palmares") return placeholderView("🏅", "Palmarès", "Les vainqueurs des éditions passées s'afficheront ici.");
      if (currentView === "defis") return placeholderView("🎯", "Défis", "Des défis bonus à relever pour gagner des points.");
      if (!myPlayer.team) { showWaiting(); return; }
      if (activeGame) { showGame(); return; }
      const typing = document.activeElement && ["teamNameInput"].includes(document.activeElement.id);
      if (!typing) showReveal();
    }

    // ---------- REALTIME (rechargements ciblés) ----------
    async function onTeams() { await loadTeams(); renderCurrent(); }
    async function onScores() { await loadScores(); renderCurrent(); }
    async function onGames() { await loadActiveGame(); if (myPlayer && myPlayer.team && activeGame) await loadTeammates(); renderCurrent(); }
    function subscribeRealtime() {
      supabase.channel("player-watch")
        .on("postgres_changes", { event:"INSERT", schema:"public", table:"players" }, () => updateCount())
        .on("postgres_changes", { event:"UPDATE", schema:"public", table:"players" }, async (p) => { if (p.new.id === myId) { myPlayer = p.new; if (myPlayer.team && activeGame) await loadTeammates(); renderCurrent(); } })
        .on("postgres_changes", { event:"DELETE", schema:"public", table:"players" }, (p) => { if (p.old.id === myId) { localStorage.removeItem(STORAGE_KEY); myId = null; myPlayer = null; myTeam = null; currentView = "main"; renderCurrent(); } })
        .on("postgres_changes", { event:"*", schema:"public", table:"teams" }, () => onTeams())
        .on("postgres_changes", { event:"*", schema:"public", table:"games" }, () => onGames())
        .on("postgres_changes", { event:"*", schema:"public", table:"scores" }, () => onScores())
        .subscribe();
    }

    async function refreshState() {
      if (!myId) return;
      const { data } = await supabase.from("players").select("*").eq("id", myId).maybeSingle();
      if (data) { myPlayer = data; await loadContext(); renderCurrent(); }
      else { localStorage.removeItem(STORAGE_KEY); myId = null; myPlayer = null; myTeam = null; renderCurrent(); }
    }
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") refreshState(); });
    window.addEventListener("focus", refreshState);
    window.addEventListener("online", refreshState);

    async function init() {
      if (myId) {
        const { data } = await supabase.from("players").select("*").eq("id", myId).maybeSingle();
        if (data) { myPlayer = data; await loadContext(); }
        else { localStorage.removeItem(STORAGE_KEY); myId = null; }
      }
      renderCurrent();
      subscribeRealtime();
    }
    init();
  </script>
</body>
</html>
